<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanShield Dashboard</title>

    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Remix Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
    
    <link rel="stylesheet" href="./components/siderbar.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="dashboard-layout d-flex">
        <!-- Sidebar Container (Keep your existing sidebar code inside here) -->
        <div id="sidebarComponent"></div>

        <!-- MAIN DASHBOARD CONTENT -->
        <div class="main-content flex-grow-1">
            
            <!-- Topbar / Header -->
            <header class="topbar d-flex justify-content-between align-items-center mb-4">
                <div class="search-container d-flex align-items-center">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search for city...">
                </div>
                
                <div class="location-header d-flex flex-column align-items-center">
                    <div class="d-flex align-items-center gap-2">
                        <i class="ri-map-pin-fill text-white fs-5"></i>
                        <span class="text-white fw-semibold">Hyderabad, Pakistan</span>
                    </div>
                    <small class="text-muted">Auto-detected</small>
                </div>
                
                <div class="user-actions d-flex align-items-center gap-3">
                    <div class="notification-btn">
                        <i class="ri-notification-3-line"></i>
                        <div class="dot"></div>
                    </div>
                    <img src="https://i.pravatar.cc/150?img=11" alt="User" class="avatar">
                </div>
            </header>

            

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./components/sidebar.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
